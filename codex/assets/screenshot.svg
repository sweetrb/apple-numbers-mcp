<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Apple Numbers marketplace preview</title>
  <desc id="desc">Read and write Apple Numbers spreadsheets - tables, cells, formulas, sheets, search, and CSV/JSON import.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4cb579"/>
      <stop offset="1" stop-color="#3da066"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="28" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #ffffff; }
    .eyebrow { font-size: 24px; font-weight: 650; opacity: .78; }
    .title { font-size: 64px; font-weight: 760; letter-spacing: 0; }
    .body { font-size: 28px; font-weight: 430; opacity: .86; }
    .chip { font-size: 21px; font-weight: 650; opacity: .92; }
    .small { font-size: 22px; font-weight: 620; opacity: .8; }
    .prompt { font-size: 24px; font-weight: 520; opacity: .86; }
  </style>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect x="44" y="44" width="1112" height="587" rx="34" fill="#ffffff" fill-opacity="0.12" stroke="#ffffff" stroke-opacity="0.22"/>
  <circle cx="106" cy="105" r="38" fill="#ffffff" fill-opacity="0.18" stroke="#ffffff" stroke-opacity="0.32"/>
  <text x="106" y="115" text-anchor="middle" style="font-size:26px;font-weight:760">AN</text>
  <text x="164" y="113" class="eyebrow">Productivity by Rob Sweet</text>
  <text x="72" y="238" class="title"><tspan x="72" dy="0">Apple Numbers</tspan></text>
  <text x="72" y="380" class="body"><tspan x="72" dy="0">Read and write Apple Numbers spreadsheets.</tspan></text>
  <rect x="72" y="505" width="176" height="42" rx="21" fill="#ffffff" fill-opacity="0.16" stroke="#ffffff" stroke-opacity="0.28"/>
  <text x="160" y="533" text-anchor="middle" class="chip">MCP Servers</text>
  <rect x="262" y="505" width="92" height="42" rx="21" fill="#ffffff" fill-opacity="0.16" stroke="#ffffff" stroke-opacity="0.28"/>
  <text x="308" y="533" text-anchor="middle" class="chip">Read</text>
  <rect x="366" y="505" width="104" height="42" rx="21" fill="#ffffff" fill-opacity="0.16" stroke="#ffffff" stroke-opacity="0.28"/>
  <text x="418" y="533" text-anchor="middle" class="chip">Write</text>
  <g filter="url(#shadow)">
    <rect x="708" y="152" width="386" height="252" rx="24" fill="#ffffff" fill-opacity="0.18" stroke="#ffffff" stroke-opacity="0.28"/>
    <text x="744" y="210" class="small">Suggested prompt</text>
    <text x="744" y="266" class="prompt"><tspan x="744" dy="0">Sum column B in my budget</tspan><tspan x="744" dy="28">spreadsheet.</tspan></text>
    <rect x="744" y="334" width="184" height="44" rx="22" fill="#ffffff" fill-opacity="0.18"/>
    <text x="836" y="363" text-anchor="middle" class="chip">Codex ready</text>
  </g>
</svg>
