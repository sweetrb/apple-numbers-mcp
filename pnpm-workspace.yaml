# pnpm build-script approvals (pnpm 11 reads these only from here, not
# package.json's `pnpm` field, `.npmrc`, or v10's `onlyBuiltDependencies`).
# esbuild ships a native binary and needs its postinstall to run.
allowBuilds:
  esbuild: true

# Pin pnpm 11's supply-chain minimum-release-age default explicitly (1440 min = 1 day)
# so it is documented and stable across pnpm upgrades. See https://pnpm.io/supply-chain-security.
minimumReleaseAge: 1440
